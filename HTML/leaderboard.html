<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rankings — Neon Deduction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0D0D0D; --pink: #FF2D78; --violet: #7B2FFF;
      --cyan: #00F5FF; --green: #00FF88; --yellow: #FFD700;
      --red: #FF3333; --text: #E8E8E8; --text-dim: #5A5A6E;
      --card-bg: #111116; --border: #21212A;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      height: 100vh; overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
      pointer-events: none; z-index: 100;
    }
    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(123,47,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(123,47,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: grid-drift 28s linear infinite;
    }
    @keyframes grid-drift { from{background-position:0 0} to{background-position:48px 48px} }
    .bg-glow {
      position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 700px 400px at 50% 10%,  rgba(123,47,255,0.09) 0%, transparent 70%),
        radial-gradient(ellipse 500px 300px at 50% 100%, rgba(123,47,255,0.20) 0%, transparent 65%),
        radial-gradient(ellipse 300px 200px at 20% 60%,  rgba(0,245,255,0.04)  0%, transparent 60%);
    }
    .bg-glow::after {
      content: ''; position: absolute; left: 0; right: 0; top: 0; height: 160px;
      background: linear-gradient(180deg, transparent 0%, rgba(0,245,255,0.04) 35%, rgba(0,245,255,0.06) 50%, rgba(0,245,255,0.04) 65%, transparent 100%);
      animation: beam-sweep 16s linear infinite;
    }
    @keyframes beam-sweep {
      0%   { transform: translateY(-160px); opacity: 0; }
      4%,70% { opacity: 1; }
      80%  { transform: translateY(100vh); opacity: 0; }
      100% { transform: translateY(100vh); opacity: 0; }
    }

    /* ── Top bar ───────────────────────────────────────────────── */
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      background: rgba(13,13,13,0.96); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .top-logo {
      font-size: 12px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase;
      background: linear-gradient(90deg, var(--pink), var(--violet));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      text-decoration: none; display: flex; align-items: center; gap: 8px;
    }
    .top-logo svg { flex-shrink: 0; }
    .top-title { font-size: 12px; font-weight: 600; letter-spacing: 0.35em; text-transform: uppercase; color: var(--text-dim); }
    .top-action { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--pink); text-decoration: none; transition: text-shadow 0.2s; }
    .top-action:hover { text-shadow: 0 0 12px rgba(255,45,120,0.7); }

    /* ── Scene ─────────────────────────────────────────────────── */
    .scene-wrap {
      position: fixed; top: 56px; bottom: 64px; left: 0; right: 0;
      overflow: hidden; z-index: 5;
    }
    .scene-header {
      position: absolute; top: 14px; left: 0; right: 0;
      text-align: center; z-index: 30; pointer-events: none;
    }
    .scene-eyebrow {
      font-size: 9px; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--cyan); text-shadow: 0 0 10px rgba(0,245,255,0.7); margin-bottom: 3px;
    }
    .scene-title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }

    /* ── Zoom controls ─────────────────────────────────────────── */
    .zoom-controls {
      position: absolute; bottom: 14px; right: 14px;
      z-index: 30; display: flex; flex-direction: column; gap: 4px;
    }
    .zoom-btn {
      width: 30px; height: 30px;
      background: rgba(4,4,11,0.88); border: 1px solid var(--border);
      color: var(--text-dim); font-size: 16px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      border-radius: 3px; cursor: pointer;
      transition: color 0.18s, border-color 0.18s;
      user-select: none;
    }
    .zoom-btn:hover { color: var(--cyan); border-color: rgba(0,245,255,0.35); }
    .zoom-hint {
      position: absolute; bottom: 14px; left: 14px; z-index: 30;
      font-size: 8px; font-weight: 600; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--text-dim); opacity: 0.35;
      pointer-events: none;
    }

    /* ── Zoomable container ────────────────────────────────────── */
    .zoom-wrap {
      position: absolute; inset: 0;
      transform-origin: center center;
      will-change: transform;
    }

    /* ── Tower stage ───────────────────────────────────────────── */
    .tower-stage {
      position: absolute; top: 0; bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 90px; z-index: 2; pointer-events: none;
    }
    .tower-stage svg { width: 100%; height: 100%; display: block; }

    /* ── Rank cards ────────────────────────────────────────────── */
    #rank-cards { position: absolute; inset: 0; z-index: 10; pointer-events: none; }

    .rank-card {
      position: absolute; width: 130px;
      pointer-events: auto; cursor: pointer;
      transition: filter 0.18s, transform 0.18s;
    }
    .rank-card:hover  { filter: brightness(1.2); transform: scale(1.03); z-index: 15; }
    .rank-card.active { filter: brightness(1.35); transform: scale(1.06); z-index: 20; }

    .rank-card-inner {
      background: rgba(4,4,11,0.95);
      border: 1px solid rgba(255,255,255,0.06);
      border-left: 2px solid;
      border-radius: 2px;
      padding: 7px 9px 7px 11px;
      position: relative;
      backdrop-filter: blur(10px);
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .rank-card.active .rank-card-inner {
      box-shadow: 0 0 18px var(--accent-color, #00F5FF);
    }

    .rank-connector {
      position: absolute; top: 50%; transform: translateY(-0.5px);
      height: 1px; width: 16px; pointer-events: none;
      transition: opacity 0.18s;
    }
    .rank-card.left  .rank-connector { right: -16px; }
    .rank-card.right .rank-connector { left:  -16px; }
    .rank-card.active .rank-connector { opacity: 1 !important; }

    .c-top   { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 2px; }
    .c-rank  { font-size: 8px; font-weight: 700; letter-spacing: 0.12em; color: var(--text-dim); opacity: 0.55; flex-shrink: 0; }
    .c-name  { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 84px; }
    .c-pts   { font-size: 14px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
    .c-pts span { font-size: 8px; opacity: 0.55; font-weight: 500; margin-left: 2px; }
    .c-bot   { display: flex; align-items: center; justify-content: space-between; }
    .c-tier  { font-size: 6.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 1px 5px; border-radius: 2px; border: 1px solid; }
    .c-wl    { font-size: 9px; color: var(--text-dim); display: flex; gap: 4px; }
    .c-wl .w { color: var(--green); }
    .c-wl .l { color: var(--red); }
    .you-tag {
      font-size: 6px; font-weight: 700; letter-spacing: 0.12em;
      color: var(--violet); background: rgba(123,47,255,0.15);
      border: 1px solid rgba(123,47,255,0.3);
      padding: 1px 3px; border-radius: 2px; text-transform: uppercase;
      vertical-align: middle; margin-left: 3px;
    }

    /* ── Detail panel (click) ──────────────────────────────────── */
    .detail-panel {
      position: fixed; top: 56px; left: 50%; transform: translateX(-50%);
      z-index: 80; width: 260px;
      background: rgba(4,4,14,0.97);
      border: 1px solid rgba(255,255,255,0.1);
      border-top: 2px solid;
      border-radius: 3px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      opacity: 0; pointer-events: none;
      transform: translateX(-50%) translateY(-8px);
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    .detail-panel.open {
      opacity: 1; pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }
    .dp-header {
      display: flex; align-items: flex-start;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .dp-rank { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; opacity: 0.4; margin-bottom: 3px; }
    .dp-name { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
    .dp-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; flex-shrink: 0;
      border: 1px solid; margin-left: 10px;
    }
    .dp-body { padding: 12px 16px 14px; }
    .dp-pts  { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; margin-bottom: 4px; }
    .dp-pts-label { font-size: 9px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; }
    .dp-stats { display: flex; gap: 16px; margin-bottom: 12px; }
    .dp-stat-val { font-size: 18px; font-weight: 700; }
    .dp-stat-lbl { font-size: 8px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); }
    .dp-tier {
      display: inline-block; font-size: 8px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 3px 10px; border-radius: 2px; border: 1px solid;
    }
    .dp-close {
      position: absolute; top: 10px; right: 12px;
      background: none; border: none; color: var(--text-dim);
      font-size: 18px; cursor: pointer; line-height: 1;
      transition: color 0.15s; padding: 2px 6px;
    }
    .dp-close:hover { color: var(--text); }

    /* ── Window / antenna animations ───────────────────────────── */
    @keyframes tw-flicker {
      0%,87%,100%{opacity:1} 89%{opacity:0.05} 92%{opacity:1} 95%{opacity:0.08} 97%{opacity:1}
    }
    .twf1{animation:tw-flicker 2.4s ease-in-out infinite 0.3s}
    .twf2{animation:tw-flicker 3.8s ease-in-out infinite 1.2s}
    .twf3{animation:tw-flicker 5.1s ease-in-out infinite 0.9s}
    .twf4{animation:tw-flicker 4.3s ease-in-out infinite 2.1s}
    .twf5{animation:tw-flicker 6.7s ease-in-out infinite 1.6s}
    @keyframes ant-blink { 0%,44%,56%,100%{opacity:1} 50%{opacity:0.04} }
    .ant-tip { animation: ant-blink 1.9s ease-in-out infinite; }

    /* ── Bottom nav ────────────────────────────────────────────── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; height: 64px;
      display: flex; align-items: stretch;
      background: rgba(13,13,13,0.97); backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
    }
    .nav-tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 5px;
      text-decoration: none; color: var(--text-dim);
      font-size: 10px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase;
      transition: color 0.2s; position: relative;
    }
    .nav-tab::after {
      content: ''; position: absolute; top: 0; left: 25%; right: 25%;
      height: 1px; background: currentColor; opacity: 0; transition: opacity 0.2s;
    }
    .nav-tab:hover { color: var(--text); }
    .nav-tab.active { color: var(--cyan); }
    .nav-tab.active::after { opacity: 0.7; }
    .nav-icon { font-size: 16px; line-height: 1; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="top-bar">
    <a href="index.html" class="top-logo">Neon Deduction</a>
    <span class="top-title">Rankings</span>
    <a href="competitive-setup.html" class="top-action">Play →</a>
  </div>

  <div class="scene-wrap" id="scene-wrap">
    <div class="scene-header">
      <p class="scene-eyebrow">// Ranked Division</p>
      <h1 class="scene-title">Detective Leaderboard</h1>
    </div>

    <div class="zoom-wrap" id="zoom-wrap">
      <!-- Skyscraper -->
      <div class="tower-stage">
        <svg id="tower-svg" viewBox="0 0 90 560"
             preserveAspectRatio="xMidYMid meet"
             xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="gl-lg" x="-80%" y="-80%" width="260%" height="260%">
              <feGaussianBlur stdDeviation="5" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="gl-md" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="2.8" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="gl-sm" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="1.4" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!-- Ground bloom -->
          <ellipse cx="45" cy="556" rx="46" ry="11" fill="#7B2FFF" opacity="0.55" filter="url(#gl-lg)"/>
          <ellipse cx="45" cy="556" rx="28" ry="6"  fill="#00F5FF" opacity="0.18" filter="url(#gl-md)"/>

          <!-- Building sections -->
          <rect id="bsect-0" x="5"  y="420" width="80" height="138" fill="#05050e" rx="1"/>
          <rect id="bsect-1" x="11" y="305" width="68" height="117" fill="#06060f" rx="1"/>
          <rect id="bsect-2" x="17" y="200" width="56" height="107" fill="#070710" rx="1"/>
          <rect id="bsect-3" x="23" y="110" width="44" height="92"  fill="#080811" rx="1"/>
          <rect id="bsect-4" x="29" y="54"  width="32" height="58"  fill="#090912" rx="1"/>
          <rect             x="36" y="24"  width="18" height="33"  fill="#0a0a14" rx="1"/>

          <!-- Neon bands -->
          <rect x="5"  y="422" width="80" height="2.5" fill="#00F5FF" opacity="0.92" filter="url(#gl-sm)"/>
          <rect x="11" y="307" width="68" height="2"   fill="#FF2D78" opacity="0.88" filter="url(#gl-sm)"/>
          <rect x="17" y="202" width="56" height="2"   fill="#7B2FFF" opacity="0.85" filter="url(#gl-sm)"/>
          <rect x="23" y="112" width="44" height="1.5" fill="#00F5FF" opacity="0.55" filter="url(#gl-sm)"/>
          <rect x="29" y="56"  width="32" height="1.5" fill="#FF2D78" opacity="0.5"  filter="url(#gl-sm)"/>

          <!-- Edge lines -->
          <line x1="5"  y1="54" x2="5"  y2="554" stroke="#00F5FF" stroke-width="0.5" opacity="0.1"/>
          <line x1="85" y1="54" x2="85" y2="554" stroke="#00F5FF" stroke-width="0.5" opacity="0.1"/>

          <!-- Antenna -->
          <line x1="45" y1="24" x2="45" y2="5" stroke="#00F5FF" stroke-width="2.2" filter="url(#gl-md)"/>
          <circle class="ant-tip" cx="45" cy="5" r="3.2" fill="#00F5FF" filter="url(#gl-lg)"/>

          <!-- Elevator light (JS animated) -->
          <circle id="elevator" cx="45" cy="554" r="4" fill="#00F5FF" opacity="0.7" filter="url(#gl-md)"/>

          <!-- Windows -->
          <g id="tower-windows"></g>

          <!-- Floor indicators (JS) -->
          <g id="floor-indicators"></g>

          <!-- Section glow overlays (JS) -->
          <g id="section-glows"></g>

          <!-- Clickable building zones (JS) -->
          <g id="building-zones" style="cursor:pointer"></g>
        </svg>
      </div>

      <!-- Rank cards -->
      <div id="rank-cards"></div>
    </div>

    <!-- Zoom controls -->
    <div class="zoom-controls">
      <div class="zoom-btn" id="zoom-in"  title="Zoom in">+</div>
      <div class="zoom-btn" id="zoom-out" title="Zoom out">−</div>
    </div>
    <p class="zoom-hint">pinch or scroll to zoom</p>
  </div>

  <!-- Detail panel -->
  <div class="detail-panel" id="detail-panel">
    <button class="dp-close" id="dp-close">×</button>
    <div class="dp-header">
      <div>
        <div class="dp-rank" id="dp-rank"></div>
        <div class="dp-name" id="dp-name"></div>
      </div>
      <div class="dp-avatar" id="dp-avatar"></div>
    </div>
    <div class="dp-body">
      <div class="dp-pts"  id="dp-pts"></div>
      <div class="dp-pts-label">Rank Points</div>
      <div class="dp-stats">
        <div><div class="dp-stat-val" id="dp-wins"></div><div class="dp-stat-lbl">Wins</div></div>
        <div><div class="dp-stat-val" id="dp-losses"></div><div class="dp-stat-lbl">Losses</div></div>
        <div><div class="dp-stat-val" id="dp-wr"></div><div class="dp-stat-lbl">Win Rate</div></div>
      </div>
      <span class="dp-tier" id="dp-tier"></span>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="hub.html" class="nav-tab"><span class="nav-icon">◈</span>Cases</a>
    <a href="leaderboard.html" class="nav-tab active"><span class="nav-icon">▲</span>Rankings</a>
    <a href="profile.html" class="nav-tab"><span class="nav-icon">○</span>Profile</a>
  </nav>

  <script src="mysteries.js"></script>
  <script>
  // ── Windows ──────────────────────────────────────────────────────
  const NS = 'http://www.w3.org/2000/svg';
  (function () {
    const g   = document.getElementById('tower-windows');
    const pal = ['#00F5FF','#FF2D78','#FFD700','#7B2FFF','#00FF88',null,null,null,null,null];
    const fc  = ['twf1','twf2','twf3','twf4','twf5'];
    [
      { bx:5,  by:420, bw:80, bh:135, ww:4, wh:4, cols:9, cg:4, rg:7, mx:6, my:8 },
      { bx:11, by:305, bw:68, bh:113, ww:4, wh:4, cols:7, cg:4, rg:7, mx:5, my:7 },
      { bx:17, by:200, bw:56, bh:100, ww:3, wh:4, cols:6, cg:4, rg:7, mx:5, my:7 },
      { bx:23, by:110, bw:44, bh:88,  ww:3, wh:3, cols:5, cg:4, rg:6, mx:4, my:7 },
      { bx:29, by:54,  bw:32, bh:54,  ww:3, wh:3, cols:4, cg:3, rg:6, mx:3, my:6 },
    ].forEach(s => {
      let y = s.by + s.my;
      while (y + s.wh < s.by + s.bh - 6) {
        for (let c = 0; c < s.cols; c++) {
          const x = s.bx + s.mx + c * (s.ww + s.cg);
          if (x + s.ww > s.bx + s.bw - s.mx) continue;
          const col = pal[Math.floor(Math.random() * pal.length)];
          if (!col) continue;
          const r = document.createElementNS(NS, 'rect');
          r.setAttribute('x', x); r.setAttribute('y', y);
          r.setAttribute('width', s.ww); r.setAttribute('height', s.wh);
          r.setAttribute('fill', col);
          r.setAttribute('opacity', (0.3 + Math.random() * 0.55).toFixed(2));
          if (Math.random() < 0.1) { r.setAttribute('filter','url(#gl-sm)'); r.classList.add(fc[Math.floor(Math.random()*fc.length)]); }
          g.appendChild(r);
        }
        y += s.wh + s.rg;
      }
    });
  })();

  // ── Players ───────────────────────────────────────────────────────
  const currentPlayerName = (localStorage.getItem('nd_comp_last_player')||'').toLowerCase();
  const DEMO = [
    { name:'CIPHER',  rankPoints:3840, wins:24, losses:4  },
    { name:'VOSS',    rankPoints:3210, wins:19, losses:7  },
    { name:'NKOSI',   rankPoints:2780, wins:17, losses:9  },
    { name:'HARLOW',  rankPoints:2390, wins:14, losses:10 },
    { name:'REYES',   rankPoints:1950, wins:11, losses:11 },
    { name:'ELARA',   rankPoints:1620, wins:9,  losses:13 },
    { name:'DUSK',    rankPoints:1280, wins:7,  losses:14 },
    { name:'TORINO',  rankPoints:940,  wins:5,  losses:16 },
  ];
  const real    = getPlayers().sort((a,b) => b.rankPoints - a.rankPoints).slice(0,8);
  const players = real.length > 0 ? real : DEMO;
  const N       = players.length;

  // ── Layout math ───────────────────────────────────────────────────
  const SVG_W = 90, SVG_H = 560;
  const F_TOP = 95, F_BOT = 505;
  const floorY = players.map((_,i) => N===1 ? (F_TOP+F_BOT)/2 : F_TOP + i*(F_BOT-F_TOP)/(N-1));

  const stage    = document.querySelector('.tower-stage');
  const sceneEl  = document.getElementById('scene-wrap');
  const stageH   = stage.offsetHeight;
  const stageW   = stage.offsetWidth;
  const svgScale = Math.min(stageW/SVG_W, stageH/SVG_H);
  const rendW    = SVG_W * svgScale, rendH = SVG_H * svgScale;
  const offTop   = (stageH - rendH) / 2;
  const offLeft  = (stageW - rendW) / 2;
  const sceneW   = sceneEl.offsetWidth;
  const towerLeft= sceneW/2 - stageW/2;
  const bldL     = towerLeft + offLeft + 5  * svgScale;
  const bldR     = towerLeft + offLeft + 85 * svgScale;
  const CARD_W=130, CARD_H=52, OVL=6;

  // ── Floor indicators + cards ──────────────────────────────────────
  const floorsG   = document.getElementById('floor-indicators');
  const glowsG    = document.getElementById('section-glows');
  const zonesG    = document.getElementById('building-zones');
  const cardsEl   = document.getElementById('rank-cards');

  const floorLines = [], floorDots = [], sectionGlows = [], cardEls = [];

  // Section Y spans for building zone rects (SVG coords)
  const sectionSpans = [
    [420,558],[305,420],[200,305],[110,200],[54,110]
  ];

  // Map each player to a building section index (by floor position)
  function sectionFor(fy) {
    for (let s=0; s<sectionSpans.length; s++) {
      const [y0,y1] = sectionSpans[s];
      if (fy >= y0 && fy <= y1) return s;
    }
    return sectionSpans.findIndex(([y0,y1]) => fy >= y0 && fy <= y1);
  }

  players.forEach((p, i) => {
    const tier  = getTierInfo(p.rankPoints);
    const isYou = p.name.toLowerCase() === currentPlayerName;
    const pos   = i + 1;
    const side  = i % 2 === 0 ? 'left' : 'right';
    const fy    = floorY[i];

    // Floor line
    const line = document.createElementNS(NS, 'line');
    line.setAttribute('x1','5'); line.setAttribute('x2','85');
    line.setAttribute('y1',fy);  line.setAttribute('y2',fy);
    line.setAttribute('stroke', tier.color);
    line.setAttribute('stroke-width','1.2');
    line.setAttribute('opacity','0.38');
    line.setAttribute('filter','url(#gl-sm)');
    floorsG.appendChild(line);
    floorLines.push(line);

    // Anchor dot
    const dot = document.createElementNS(NS, 'circle');
    dot.setAttribute('cx', side==='left' ? '5' : '85');
    dot.setAttribute('cy', fy);
    dot.setAttribute('r','3');
    dot.setAttribute('fill', tier.color);
    dot.setAttribute('filter','url(#gl-sm)');
    floorsG.appendChild(dot);
    floorDots.push(dot);

    // Section glow overlay (hidden by default)
    const sectIdx = Math.min(Math.floor(i * sectionSpans.length / N), sectionSpans.length-1);
    const [sy0, sy1] = sectionSpans[sectIdx];
    const sgRect = document.createElementNS(NS, 'rect');
    const secDef = [
      { x:5,  w:80 }, { x:11, w:68 }, { x:17, w:56 }, { x:23, w:44 }, { x:29, w:32 }
    ][sectIdx] || { x:5, w:80 };
    sgRect.setAttribute('x', secDef.x); sgRect.setAttribute('width', secDef.w);
    sgRect.setAttribute('y', sy0); sgRect.setAttribute('height', sy1 - sy0);
    sgRect.setAttribute('fill', tier.color); sgRect.setAttribute('opacity','0');
    sgRect.setAttribute('rx','1'); sgRect.setAttribute('pointer-events','none');
    glowsG.appendChild(sgRect);
    sectionGlows.push(sgRect);

    // Card
    const floorSceneY = offTop + fy * svgScale;
    const cardTop  = floorSceneY - CARD_H/2;
    const cardLeft = side==='left' ? bldL - CARD_W + OVL : bldR - OVL;
    const posLabel = pos===1 ? '⬡' : pos===2 ? '⬟' : pos===3 ? '△' : String(pos).padStart(2,'0');

    const card = document.createElement('div');
    card.className = `rank-card ${side}`;
    card.style.left = `${cardLeft}px`;
    card.style.top  = `${cardTop}px`;
    card.style.setProperty('--accent-color', tier.color);

    card.innerHTML = `
      <div class="rank-card-inner"
           style="border-left-color:${tier.color};border-color:${tier.color}28">
        <span class="rank-connector"
              style="background:${tier.color};box-shadow:0 0 5px ${tier.color};opacity:0.55;"></span>
        <div class="c-top">
          <span class="c-name" style="color:${pos<=3?tier.color:'var(--text)'}">
            ${escapeHtml(p.name)}${isYou?'<span class="you-tag">YOU</span>':''}
          </span>
          <span class="c-rank">${posLabel}</span>
        </div>
        <div class="c-pts" style="color:${tier.color};text-shadow:0 0 8px ${tier.glow}">
          ${p.rankPoints.toLocaleString()}<span>pts</span>
        </div>
        <div class="c-bot">
          <span class="c-tier" style="color:${tier.color};border-color:${tier.color}44;background:${tier.color}12">
            ${tier.tier}
          </span>
          <span class="c-wl"><span class="w">${p.wins}W</span><span class="l">${p.losses}L</span></span>
        </div>
      </div>`;

    cardsEl.appendChild(card);
    cardEls.push(card);
  });

  // ── Hover interactions ────────────────────────────────────────────
  let activeIdx = -1;

  function activateFloor(i) {
    if (activeIdx === i) return;
    deactivateFloor();
    activeIdx = i;
    floorLines[i].setAttribute('stroke-width','2.5');
    floorLines[i].setAttribute('opacity','0.9');
    floorDots[i].setAttribute('r','4.5');
    sectionGlows[i].setAttribute('opacity','0.045');
    cardEls[i].classList.add('active');
  }
  function deactivateFloor() {
    if (activeIdx < 0) return;
    const j = activeIdx;
    activeIdx = -1;
    floorLines[j].setAttribute('stroke-width','1.2');
    floorLines[j].setAttribute('opacity','0.38');
    floorDots[j].setAttribute('r','3');
    sectionGlows[j].setAttribute('opacity','0');
    cardEls[j].classList.remove('active');
  }

  cardEls.forEach((card, i) => {
    card.addEventListener('mouseenter', () => activateFloor(i));
    card.addEventListener('mouseleave', deactivateFloor);
    card.addEventListener('click', () => openDetail(i));
    card.addEventListener('touchend', e => { e.preventDefault(); openDetail(i); });
  });

  // ── Detail panel ──────────────────────────────────────────────────
  const panel    = document.getElementById('detail-panel');
  const dpClose  = document.getElementById('dp-close');
  dpClose.addEventListener('click', closeDetail);

  function openDetail(i) {
    const p    = players[i];
    const tier = getTierInfo(p.rankPoints);
    const pos  = i + 1;
    const posLabel = pos===1 ? '#1 ⬡' : pos===2 ? '#2 ⬟' : pos===3 ? '#3 △' : `#${pos}`;
    const initials = p.name.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const total = p.wins + p.losses;
    const wr    = total > 0 ? Math.round(p.wins / total * 100) + '%' : '—';

    document.getElementById('dp-rank').textContent = posLabel;
    document.getElementById('dp-name').textContent = p.name;
    document.getElementById('dp-pts').textContent  = p.rankPoints.toLocaleString();
    document.getElementById('dp-wins').textContent   = p.wins;
    document.getElementById('dp-losses').textContent = p.losses;
    document.getElementById('dp-wr').textContent     = wr;

    const avatar = document.getElementById('dp-avatar');
    avatar.textContent = initials;
    avatar.style.cssText = `background:${tier.color}18;border-color:${tier.color}55;color:${tier.color};text-shadow:0 0 8px ${tier.glow}`;

    document.getElementById('dp-pts').style.cssText = `color:${tier.color};text-shadow:0 0 16px ${tier.glow};font-size:28px;font-weight:700;letter-spacing:-0.02em;line-height:1;margin-bottom:4px`;
    document.getElementById('dp-wins').style.color  = 'var(--green)';
    document.getElementById('dp-losses').style.color= 'var(--red)';

    const dpTier = document.getElementById('dp-tier');
    dpTier.textContent = tier.tier;
    dpTier.style.cssText = `color:${tier.color};border-color:${tier.color}44;background:${tier.color}11`;

    panel.style.borderTopColor = tier.color;
    panel.style.boxShadow = `0 0 30px ${tier.color}22, 0 20px 60px rgba(0,0,0,0.85)`;
    panel.classList.add('open');
  }
  function closeDetail() { panel.classList.remove('open'); }
  document.addEventListener('keydown', e => { if (e.key==='Escape') closeDetail(); });

  // ── Elevator animation ────────────────────────────────────────────
  const elevator = document.getElementById('elevator');
  let elevY = 554, elevDir = -1, elevSpeed = 1.4;
  (function tick() {
    elevY += elevDir * elevSpeed;
    if (elevY <= 6)   { elevY = 6;   elevDir = 1; }
    if (elevY >= 554) { elevY = 554; elevDir = -1; }
    elevator.setAttribute('cy', elevY.toFixed(1));
    // Color cycles through floors
    const t = (elevY - 6) / (554 - 6);
    const colors = ['#00F5FF','#7B2FFF','#FF2D78','#FFD700','#00FF88'];
    elevator.setAttribute('fill', colors[Math.floor(t * colors.length) % colors.length]);
    requestAnimationFrame(tick);
  })();

  // ── Zoom ─────────────────────────────────────────────────────────
  const zoomWrap = document.getElementById('zoom-wrap');
  let zoom = 1, minZoom = 0.55, maxZoom = 3.5;
  function applyZoom(z) {
    zoom = Math.min(maxZoom, Math.max(minZoom, z));
    zoomWrap.style.transform = `scale(${zoom})`;
  }

  // Buttons
  document.getElementById('zoom-in').addEventListener('click',  () => applyZoom(zoom * 1.25));
  document.getElementById('zoom-out').addEventListener('click', () => applyZoom(zoom / 1.25));

  // Wheel
  sceneEl.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.88 : 1.14;
    applyZoom(zoom * delta);
  }, { passive: false });

  // Pinch (touch)
  let lastDist = null;
  sceneEl.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      lastDist = Math.hypot(dx, dy);
    }
  }, { passive: true });
  sceneEl.addEventListener('touchmove', e => {
    if (e.touches.length === 2 && lastDist !== null) {
      e.preventDefault();
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.hypot(dx, dy);
      applyZoom(zoom * (dist / lastDist));
      lastDist = dist;
    }
  }, { passive: false });
  sceneEl.addEventListener('touchend', () => { lastDist = null; });
  </script>
  <script src="shared.js"></script>
</body>
</html>
