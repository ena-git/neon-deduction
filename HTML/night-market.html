<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Night Market — Neon Deduction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0D0D0D; --pink: #FF2D78; --violet: #7B2FFF;
      --cyan: #00F5FF; --green: #00FF88; --yellow: #FFD700;
      --red: #FF3333; --text: #E8E8E8; --text-dim: #5A5A6E;
      --card-bg: #111116; --border: #21212A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg); color: var(--text);
      font-family: 'Space Grotesk', sans-serif; min-height: 100vh;
    }

    /* Scanlines */
    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
      );
      pointer-events: none; z-index: 100;
    }

    /* City grid */
    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,45,120,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,45,120,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: grid-drift 32s linear infinite;
    }
    @keyframes grid-drift {
      from { background-position: 0 0; }
      to   { background-position: 48px 48px; }
    }

    /* Ambient glow */
    .bg-glow {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 50% 5%,  rgba(255,45,120,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 400px 300px at 90% 60%, rgba(123,47,255,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 300px 300px at 5%  70%, rgba(0,245,255,0.03) 0%, transparent 60%);
      pointer-events: none;
    }
    .bg-glow::after {
      content: '';
      position: absolute;
      left: 0; right: 0; top: 0;
      height: 160px;
      background: linear-gradient(180deg, transparent 0%, rgba(0,245,255,0.04) 35%, rgba(0,245,255,0.06) 50%, rgba(0,245,255,0.04) 65%, transparent 100%);
      animation: beam-sweep 16s linear infinite;
    }
    @keyframes beam-sweep {
      0%   { transform: translateY(-160px); opacity: 0; }
      4%   { opacity: 1; }
      70%  { opacity: 1; }
      80%  { transform: translateY(100vh); opacity: 0; }
      100% { transform: translateY(100vh); opacity: 0; }
    }

    /* Top bar */
    .top-bar {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 40px;
      background: rgba(13,13,13,0.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .top-logo {
      font-size: 12px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase;
      background: linear-gradient(90deg, var(--pink), var(--violet));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      text-decoration: none; display: flex; align-items: center; gap: 8px;
    }
    .top-logo svg { flex-shrink: 0; }
    .top-title {
      font-size: 12px; font-weight: 600; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--text-dim);
    }
    .currency-display {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 700; color: var(--yellow);
    }

    /* Page header */
    .page-header {
      position: relative; z-index: 5;
      padding: 48px 40px 24px;
    }
    .page-eyebrow {
      font-size: 11px; font-weight: 600; letter-spacing: 0.3em;
      color: var(--pink); text-transform: uppercase; margin-bottom: 10px;
      text-shadow: 0 0 14px rgba(255,45,120,0.7);
    }
    .page-title {
      font-size: 36px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1;
    }
    .page-subtitle {
      font-size: 13px; color: var(--text-dim); margin-top: 8px;
    }
    .header-rule {
      height: 1px;
      background: linear-gradient(90deg, var(--pink) 0%, transparent 60%);
      margin-top: 24px; opacity: 0.4;
    }

    /* Content */
    .content {
      position: relative; z-index: 5;
      max-width: 700px;
      padding: 8px 40px 100px;
    }

    /* Section */
    .shop-section { margin-bottom: 36px; }
    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--text-dim);
      margin-bottom: 14px; margin-top: 8px;
    }

    /* Item grid */
    .item-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }

    /* Item card */
    .item-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 14px 14px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      position: relative; overflow: hidden;
      transition: border-color 0.25s, transform 0.2s, box-shadow 0.25s;
    }
    .item-card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.5); }
    .item-card.owned  { border-color: rgba(123,47,255,0.3); }
    .item-card.active { border-color: rgba(0,245,255,0.45); background: rgba(0,245,255,0.04); }

    /* Equipped glow strip at top */
    .item-card.active::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    }

    /* Preview area */
    .item-preview {
      width: 56px; height: 56px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      font-size: 26px; line-height: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .item-preview.border-preview {
      background: transparent;
      border-width: 3px;
    }
    .item-preview.svg-avatar svg {
      width: 100%; height: 100%; display: block;
    }
    .item-preview.title-preview {
      border-radius: 6px; width: auto; min-width: 56px; height: auto;
      padding: 6px 12px; font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      white-space: nowrap;
    }

    .item-name {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-align: center; line-height: 1.3;
    }

    /* Action button */
    .item-btn {
      width: 100%; padding: 7px 0;
      background: transparent; border-radius: 4px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .item-btn.btn-buy {
      border: 1px solid rgba(255,215,0,0.4); color: var(--yellow);
    }
    .item-btn.btn-buy:hover { background: rgba(255,215,0,0.08); border-color: var(--yellow); }
    .item-btn.btn-buy:disabled {
      border-color: var(--border); color: var(--text-dim); cursor: not-allowed;
    }
    .item-btn.btn-equip {
      border: 1px solid rgba(123,47,255,0.4); color: var(--violet);
    }
    .item-btn.btn-equip:hover { background: rgba(123,47,255,0.1); }
    .item-btn.btn-equipped {
      border: 1px solid rgba(0,245,255,0.3); color: var(--cyan);
      background: rgba(0,245,255,0.05); cursor: default;
    }

    /* Insufficient funds notice */
    .btn-no-funds {
      font-size: 9px; color: var(--red); text-align: center; margin-top: -4px;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(13,13,13,0.95); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 24px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.1em;
      opacity: 0; transition: opacity 0.25s, transform 0.25s;
      z-index: 200; white-space: nowrap;
    }
    .toast.show {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }

    /* Bottom nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      display: flex; align-items: stretch;
      background: rgba(13,13,13,0.97); backdrop-filter: blur(16px);
      border-top: 1px solid var(--border); height: 64px;
    }
    .nav-tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 5px;
      text-decoration: none; color: var(--text-dim);
      font-size: 10px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase;
      transition: color 0.2s; position: relative;
    }
    .nav-tab::after {
      content: ''; position: absolute; top: 0; left: 25%; right: 25%;
      height: 1px; background: currentColor; opacity: 0; transition: opacity 0.2s;
    }
    .nav-tab:hover { color: var(--text); }
    .nav-tab.active { color: var(--cyan); }
    .nav-tab.active::after { opacity: 0.7; }
    .nav-icon { font-size: 16px; line-height: 1; }
  </style>
</head>

    function getCategoryPrice(categoryKey) {
      return (CATEGORIES.find(c => c.key === categoryKey) || {}).price || 0;
    }

    // ── Persistence helpers ──────────────────────────────────────
    function getOwned() {
      try { return JSON.parse(localStorage.getItem('nd_market_owned') || '[]'); }
      catch (_) { return []; }
    }
    function setOwned(arr) { localStorage.setItem('nd_market_owned', JSON.stringify(arr)); }
    function isOwned(id) { return getOwned().includes(id); }

    function getEquipped(category) {
      return localStorage.getItem('nd_equipped_' + category) || null;
    }
    function setEquipped(category, id) {
      localStorage.setItem('nd_equipped_' + category, id);
    }
    function unequip(category) {
      localStorage.removeItem('nd_equipped_' + category);
    }

    function spendCurrency(amount) {
      const cur = getCurrency();
      if (cur < amount) return false;
      localStorage.setItem('nd_currency', String(cur - amount));
      return true;
    }

    // ── Toast ─────────────────────────────────────────────────────
    let toastTimer = null;
    function showToast(msg, color) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.style.color = color || 'var(--text)';
      el.style.borderColor = color ? color + '44' : 'var(--border)';
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
    }

    // ── Buy / Equip actions ───────────────────────────────────────
    function buyItem(id) {
      const item = SHOP_ITEMS.find(x => x.id === id);
      if (!item || isOwned(id)) return;
      const price = getCategoryPrice(item.category);
      if (!spendCurrency(price)) {
        showToast('Not enough credits', 'var(--red)');
        return;
      }
      const owned = getOwned();
      owned.push(id);
      setOwned(owned);
      document.getElementById('currency-val').textContent = getCurrency().toLocaleString();
      showToast(item.label + ' unlocked!', 'var(--green)');
      renderShop();
    }

    function equipItem(id) {
      const item = SHOP_ITEMS.find(x => x.id === id);
      if (!item) return;
      const current = getEquipped(item.category);
      if (current === id) {
        unequip(item.category);
        // Remove profile text color if unequipping a frame
        if (item.category === 'border') localStorage.removeItem('nd_profile_text_color');
        showToast('Unequipped', 'var(--text-dim)');
      } else {
        setEquipped(item.category, id);
        // Store frame color as profile text color
        if (item.category === 'border' && item.color) {
          localStorage.setItem('nd_profile_text_color', item.color);
        }
        showToast(item.label + ' equipped!', 'var(--cyan)');
      }
      renderShop();
    }

    // ── Render ────────────────────────────────────────────────────
    function renderShop() {
      const currency = getCurrency();
      const root = document.getElementById('shop-root');
      root.innerHTML = '';

      CATEGORIES.forEach(cat => {
        const items = SHOP_ITEMS.filter(x => x.category === cat.key);
        if (!items.length) return;
        const equippedId = getEquipped(cat.key);
        const price = cat.price;

        const section = document.createElement('div');
        section.className = 'shop-section';
        section.innerHTML = `<p class="section-label">${escapeHtml(cat.label)}</p>`;

        const grid = document.createElement('div');
        grid.className = 'item-grid';

        items.forEach(item => {
          const owned    = isOwned(item.id);
          const equipped = equippedId === item.id;
          const canAfford = currency >= price;

          // Preview element
          let previewHTML = '';
          if (item.category === 'player-avatar') {
            const glowColor = equipped ? 'var(--cyan)' : (owned ? 'rgba(123,47,255,0.5)' : 'rgba(255,255,255,0.08)');
            previewHTML = `<div class="item-preview svg-avatar" style="border-color:${glowColor};padding:0;overflow:hidden">${item.svg}</div>`;
          } else if (item.category === 'avatar') {
            previewHTML = `<div class="item-preview" style="border-color:rgba(255,255,255,0.1)">${item.icon}</div>`;
          } else if (item.category === 'border') {
            const glow = item.color + '55';
            previewHTML = `<div class="item-preview border-preview"
              style="border-color:${item.color};box-shadow:0 0 10px ${glow},inset 0 0 8px ${glow}">
            </div>`;
          } else if (item.category === 'title') {
            const col = equipped ? 'var(--cyan)' : (owned ? 'var(--violet)' : 'var(--text-dim)');
            previewHTML = `<div class="item-preview title-preview"
              style="color:${col};border:1px solid ${col}44;background:${col}11">
              ${escapeHtml(item.label)}
            </div>`;
          }

          // Button
          let btnHTML = '';
          if (equipped) {
            btnHTML = `<button class="item-btn btn-equipped" onclick="equipItem('${item.id}')">● Equipped</button>`;
          } else if (owned) {
            btnHTML = `<button class="item-btn btn-equip" onclick="equipItem('${item.id}')">Equip</button>`;
          } else if (canAfford) {
            btnHTML = `<button class="item-btn btn-buy" onclick="buyItem('${item.id}')">◈ ${price}</button>`;
          } else {
            btnHTML = `<button class="item-btn btn-buy" disabled>◈ ${price}</button>
                       <p class="btn-no-funds">need ${(price - currency)} more</p>`;
          }

          const card = document.createElement('div');
          card.className = `item-card${owned ? ' owned' : ''}${equipped ? ' active' : ''}`;
          card.innerHTML = `
            ${previewHTML}
            <span class="item-name">${escapeHtml(item.label)}</span>
            ${btnHTML}
          `;
          grid.appendChild(card);
        });

        section.appendChild(grid);
        root.appendChild(section);
      });
    }

    // Init
    document.getElementById('currency-val').textContent = getCurrency().toLocaleString();
    renderShop();
  </script>
  <script src="shared.js"></script>
</body>
</html>
