<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cases — Neon Deduction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0D0D0D;
      --pink: #FF2D78;
      --violet: #7B2FFF;
      --cyan: #00F5FF;
      --green: #00FF88;
      --yellow: #FFD700;
      --text: #E8E8E8;
      --text-dim: #5A5A6E;
      --card-bg: #111116;
      --border: #21212A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 800px 500px at 50% 20%, rgba(123,47,255,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .bg-glow::after {
      content: '';
      position: absolute;
      left: 0; right: 0; top: 0;
      height: 160px;
      background: linear-gradient(180deg, transparent 0%, rgba(0,245,255,0.04) 35%, rgba(0,245,255,0.06) 50%, rgba(0,245,255,0.04) 65%, transparent 100%);
      animation: beam-sweep 16s linear infinite;
    }
    @keyframes beam-sweep {
      0%   { transform: translateY(-160px); opacity: 0; }
      4%   { opacity: 1; }
      70%  { opacity: 1; }
      80%  { transform: translateY(100vh); opacity: 0; }
      100% { transform: translateY(100vh); opacity: 0; }
    }

    /* City grid */
    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(123,47,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(123,47,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: grid-drift 30s linear infinite;
    }
    @keyframes grid-drift {
      from { background-position: 0 0; }
      to   { background-position: 48px 48px; }
    }

    /* Top bar */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 40px;
      background: rgba(13,13,13,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .top-logo {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--pink), var(--violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .top-logo svg { flex-shrink: 0; }

    .top-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .currency-display {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--yellow);
    }

    /* Section header */
    .section-header {
      padding: 14px 14px 10px;
    }

    .section-eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 6px;
      text-shadow: 0 0 14px rgba(0,245,255,0.7);
    }

    .section-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .section-subtitle {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .header-rule {
      height: 1px;
      background: linear-gradient(90deg, var(--violet) 0%, transparent 60%);
      margin-top: 14px;
      opacity: 0.4;
      position: relative;
      overflow: hidden;
    }
    .header-rule::after {
      content: '';
      position: absolute;
      top: 0; left: -80px; width: 80px; height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.7), transparent);
      animation: scan-pulse 10s ease-in-out infinite 2s;
    }
    @keyframes scan-pulse {
      0%   { left: -80px; opacity: 0; }
      2%   { opacity: 1; }
      12%  { left: 100%; opacity: 0.8; }
      14%  { opacity: 0; }
      100% { left: 100%; opacity: 0; }
    }


    /* ── Corner fold ─────────────────────────────────────────────── */
    .mode-fold {
      position: absolute;
      bottom: 0; right: 0;
      width: 10px; height: 10px;
      background: linear-gradient(225deg, var(--bg) 44%, rgba(255,255,255,0.05) 44%);
      transition: width 0.25s ease, height 0.25s ease, box-shadow 0.25s ease;
      z-index: 2;
    }
    .mode-card:hover .mode-fold { width: 16px; height: 16px; }
    .mode-card.practice:hover    .mode-fold { box-shadow: -2px -2px 6px rgba(0,245,255,0.15); }
    .mode-card.competitive:hover .mode-fold { box-shadow: -2px -2px 6px rgba(255,45,120,0.15); }
    .mode-card.party:hover       .mode-fold { box-shadow: -2px -2px 6px rgba(123,47,255,0.15); }
    .mode-card.meetup:hover      .mode-fold { box-shadow: -2px -2px 6px rgba(0,255,136,0.15); }

    /* Mode list — horizontal shelf of book-spine cards */
    .mode-list {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      gap: 6px;
      padding: 8px 12px 72px;
      height: calc(100vh - 180px); /* fill remaining screen */
    }

    /* ── Book-spine / document card ──────────────────────────────── */
    .mode-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-top-width: 3px;
      border-radius: 2px 2px 1px 1px;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
      transition: border-color 0.22s, box-shadow 0.22s, transform 0.2s;
    }
    .mode-card:hover { transform: translateY(-4px); }

    .mode-card.practice    { border-color: rgba(0,245,255,0.15);  border-top-color: var(--cyan); }
    .mode-card.competitive { border-color: rgba(255,45,120,0.15); border-top-color: var(--pink); }
    .mode-card.party       { border-color: rgba(123,47,255,0.15); border-top-color: var(--violet); }
    .mode-card.meetup      { border-color: rgba(0,255,136,0.15);  border-top-color: var(--green); }

    /* Stacked page depth — always visible */
    .mode-card.practice    { box-shadow: 3px 3px 0 rgba(0,245,255,0.07),  6px 6px 0 rgba(0,245,255,0.04); }
    .mode-card.competitive { box-shadow: 3px 3px 0 rgba(255,45,120,0.07), 6px 6px 0 rgba(255,45,120,0.04); }
    .mode-card.party       { box-shadow: 3px 3px 0 rgba(123,47,255,0.07), 6px 6px 0 rgba(123,47,255,0.04); }
    .mode-card.meetup      { box-shadow: 3px 3px 0 rgba(0,255,136,0.07),  6px 6px 0 rgba(0,255,136,0.04); }

    .mode-card.practice:hover    { border-color: rgba(0,245,255,0.4);  box-shadow: 4px 4px 0 rgba(0,245,255,0.1),  8px 8px 0 rgba(0,245,255,0.05),  0 12px 28px rgba(0,245,255,0.1); }
    .mode-card.competitive:hover { border-color: rgba(255,45,120,0.4); box-shadow: 4px 4px 0 rgba(255,45,120,0.1), 8px 8px 0 rgba(255,45,120,0.05), 0 12px 28px rgba(255,45,120,0.1); }
    .mode-card.party:hover       { border-color: rgba(123,47,255,0.4); box-shadow: 4px 4px 0 rgba(123,47,255,0.1), 8px 8px 0 rgba(123,47,255,0.05), 0 12px 28px rgba(123,47,255,0.1); }
    .mode-card.meetup:hover      { border-color: rgba(0,255,136,0.4);  box-shadow: 4px 4px 0 rgba(0,255,136,0.1),  8px 8px 0 rgba(0,255,136,0.05),  0 12px 28px rgba(0,255,136,0.1); }

    /* Page-flip shimmer — sweeps across on hover */
    .mode-card::before {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: -80%;
      width: 60%;
      background: linear-gradient(
        105deg,
        transparent 0%,
        rgba(255,255,255,0.06) 20%,
        rgba(255,255,255,0.22) 50%,
        rgba(255,255,255,0.06) 80%,
        transparent 100%
      );
      transform: skewX(-12deg);
      pointer-events: none;
      z-index: 3;
      opacity: 0;
    }
    .mode-card:hover::before {
      animation: flip-shimmer 0.45s ease-in-out forwards;
    }
    @keyframes flip-shimmer {
      0%   { left: -80%; opacity: 1; }
      100% { left: 140%; opacity: 1; }
    }

    /* Top header: file number */
    .mode-file-header {
      width: 100%;
      padding: 8px 8px 6px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mode-card.practice    .mode-file-header { background: rgba(0,245,255,0.04); }
    .mode-card.competitive .mode-file-header { background: rgba(255,45,120,0.04); }
    .mode-card.party       .mode-file-header { background: rgba(123,47,255,0.04); }
    .mode-card.meetup      .mode-file-header { background: rgba(0,255,136,0.04); }

    .mode-case-label {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      opacity: 0.45;
    }

    /* Body: icon + name + desc stacked, centered */
    .mode-file-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 8px;
      gap: 8px;
      text-align: center;
    }

    .mode-icon {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .mode-card.practice   .mode-icon { background: rgba(0,245,255,0.07);  border: 1px solid rgba(0,245,255,0.2);  color: var(--cyan); }
    .mode-card.competitive .mode-icon { background: rgba(255,45,120,0.07); border: 1px solid rgba(255,45,120,0.2); color: var(--pink); }
    .mode-card.party       .mode-icon { background: rgba(123,47,255,0.07); border: 1px solid rgba(123,47,255,0.2); color: var(--violet); }
    .mode-card.meetup      .mode-icon { background: rgba(0,255,136,0.07);  border: 1px solid rgba(0,255,136,0.2);  color: var(--green); }

    .mode-svg { width: 15px; height: 15px; }
    .mode-card.practice   .mode-svg { filter: drop-shadow(0 0 4px rgba(0,245,255,0.6)); }
    .mode-card.competitive .mode-svg { filter: drop-shadow(0 0 4px rgba(255,45,120,0.6)); }
    .mode-card.party       .mode-svg { filter: drop-shadow(0 0 4px rgba(123,47,255,0.6)); }
    .mode-card.meetup      .mode-svg { filter: drop-shadow(0 0 4px rgba(0,255,136,0.6)); }

    .mode-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1.2;
    }
    .mode-card.practice    .mode-name { color: var(--cyan); }
    .mode-card.competitive .mode-name { color: var(--pink); }
    .mode-card.party       .mode-name { color: var(--violet); }
    .mode-card.meetup      .mode-name { color: var(--green); }

    .mode-desc {
      display: block;
      font-size: 9px;
      color: var(--text-dim);
      font-weight: 400;
      line-height: 1.4;
    }

    /* Bottom navigation bar */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      align-items: stretch;
      background: rgba(13,13,13,0.97);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      height: 64px;
    }

    .nav-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      text-decoration: none;
      color: var(--text-dim);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: color 0.2s;
      position: relative;
    }

    .nav-tab::after {
      content: '';
      position: absolute;
      top: 0;
      left: 25%;
      right: 25%;
      height: 1px;
      background: currentColor;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .nav-tab:hover { color: var(--text); }
    .nav-tab.active { color: var(--cyan); }
    .nav-tab.active::after { opacity: 0.7; }

    .nav-icon {
      font-size: 16px;
      line-height: 1;
    }

    /* ════════════════════════════════════════════════════
       NOTEBOOK BOOKMARK REDESIGN
    ════════════════════════════════════════════════════ */

    /* Extra top padding so tabs protrude above without clipping */
    .mode-list { padding-top: 44px; }

    /* Card: visible overflow so tab sticks above top edge */
    .mode-card { overflow: visible; }

    /* Inner wrapper takes over overflow:hidden for shimmer containment */
    .mode-card-inner {
      position: relative;
      overflow: hidden;
      flex: 1; width: 100%;
      display: flex; flex-direction: column; align-items: center;
      border-radius: 2px 2px 1px 1px;
      /* Ruled notebook lines inside each card */
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 22px,
        rgba(255,255,255,0.025) 22px, rgba(255,255,255,0.025) 23px
      );
    }

    /* Migrate page-flip shimmer from .mode-card::before to .mode-card-inner::before */
    .mode-card::before { content: none; }
    .mode-card-inner::before {
      content: '';
      position: absolute; top: 0; bottom: 0; left: -80%; width: 60%;
      background: linear-gradient(
        105deg,
        transparent 0%, rgba(255,255,255,0.06) 20%,
        rgba(255,255,255,0.22) 50%, rgba(255,255,255,0.06) 80%, transparent 100%
      );
      transform: skewX(-12deg);
      pointer-events: none; z-index: 3; opacity: 0;
    }
    .mode-card:hover .mode-card-inner::before {
      animation: flip-shimmer 0.45s ease-in-out forwards;
    }

    /* ── Bookmark tab ───────────────────────────────────── */
    .mode-tab {
      position: absolute;
      top: -34px; left: 50%;
      transform: translateX(-50%);
      height: 34px; min-width: 76%; padding: 0 6px;
      border-radius: 4px 4px 0 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 7.5px; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; white-space: nowrap;
      z-index: 4;
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s;
    }

    /* Slide up on hover — must include translateX(-50%) to preserve centering */
    .mode-card:hover .mode-tab {
      transform: translateX(-50%) translateY(-8px);
    }

    /* Per-mode colors */
    .mode-card.practice    .mode-tab { background: #00F5FF; color: #000; }
    .mode-card.competitive .mode-tab { background: #FF2D78; color: #000; }
    .mode-card.party       .mode-tab { background: #7B2FFF; color: #fff; }
    .mode-card.meetup      .mode-tab { background: #00FF88; color: #000; }

    /* Neon glow on hovered tab */
    .mode-card.practice:hover    .mode-tab { box-shadow: 0 -4px 16px rgba(0,245,255,0.45); }
    .mode-card.competitive:hover .mode-tab { box-shadow: 0 -4px 16px rgba(255,45,120,0.45); }
    .mode-card.party:hover       .mode-tab { box-shadow: 0 -4px 16px rgba(123,47,255,0.45); }
    .mode-card.meetup:hover      .mode-tab { box-shadow: 0 -4px 16px rgba(0,255,136,0.45); }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="top-bar">
    <a href="index.html" class="top-logo">Neon Deduction</a>
    <span class="top-title">Cases</span>
    <div class="currency-display">◈ <span id="currency-val">0</span></div>
  </div>

  <div class="section-header">
    <p class="section-eyebrow">// Choose Mode</p>
    <h1 class="section-title">Select a Mode</h1>
    <p class="section-subtitle">Pick how you want to investigate.</p>
    <div class="header-rule"></div>
  </div>

  <div class="mode-list">

    <!-- Practice -->
    <a href="mystery-selection.html" class="mode-card practice">
      <div class="mode-tab">PRACTICE</div>
      <div class="mode-card-inner">
        <div class="mode-file-header"><span class="mode-case-label">01</span></div>
        <div class="mode-file-body">
          <div class="mode-icon">
            <svg class="mode-svg" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="7"/>
              <line x1="16.5" y1="16.5" x2="23" y2="23"/>
              <circle cx="11" cy="11" r="2.5"/>
              <line x1="8.2" y1="11" x2="5.5" y2="11"/>
              <line x1="13.8" y1="11" x2="16.5" y2="11"/>
              <line x1="11" y1="8.2" x2="11" y2="5.5"/>
              <line x1="11" y1="13.8" x2="11" y2="16.5"/>
            </svg>
          </div>
          <div class="mode-name">Practice</div>
          <span class="mode-desc">Solve cases at your own pace.</span>
        </div>
        <span class="mode-fold"></span>
      </div>
    </a>

    <!-- Competitive -->
    <a href="competitive-setup.html" class="mode-card competitive">
      <div class="mode-tab">COMPETITIVE</div>
      <div class="mode-card-inner">
        <div class="mode-file-header"><span class="mode-case-label">02</span></div>
        <div class="mode-file-body">
          <div class="mode-icon">
            <svg class="mode-svg" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3,21 6,10 11,16 14,7 17,16 22,10 25,21"/>
              <line x1="3" y1="24.5" x2="25" y2="24.5"/>
            </svg>
          </div>
          <div class="mode-name">Competitive</div>
          <span class="mode-desc">Climb the rankings.</span>
        </div>
        <span class="mode-fold"></span>
      </div>
    </a>

    <!-- Party -->
    <a href="party-setup.html" class="mode-card party">
      <div class="mode-tab">PARTY</div>
      <div class="mode-card-inner">
        <div class="mode-file-header"><span class="mode-case-label">03</span></div>
        <div class="mode-file-body">
          <div class="mode-icon">
            <svg class="mode-svg" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="14" cy="6"  r="3"/>
              <circle cx="5"  cy="21" r="3"/>
              <circle cx="23" cy="21" r="3"/>
              <line x1="11.4" y1="8.6"  x2="7.2"  y2="18.4"/>
              <line x1="16.6" y1="8.6"  x2="20.8" y2="18.4"/>
              <line x1="8"    y1="22"   x2="20"   y2="22"/>
            </svg>
          </div>
          <div class="mode-name">Party</div>
          <span class="mode-desc">Group deductions.</span>
        </div>
        <span class="mode-fold"></span>
      </div>
    </a>

    <!-- Meetup -->
    <a href="meetup-selection.html" class="mode-card meetup">
      <div class="mode-tab">MEETUP</div>
      <div class="mode-card-inner">
        <div class="mode-file-header"><span class="mode-case-label">04</span></div>
        <div class="mode-file-body">
          <div class="mode-icon">
            <svg class="mode-svg" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 3 C9.3 3 5.5 6.9 5.5 11.5 C5.5 17.8 14 25.5 14 25.5 C14 25.5 22.5 17.8 22.5 11.5 C22.5 6.9 18.7 3 14 3 Z"/>
              <circle cx="14" cy="11.5" r="3.5"/>
            </svg>
          </div>
          <div class="mode-name">Meetup</div>
          <span class="mode-desc">In-person sessions.</span>
        </div>
        <span class="mode-fold"></span>
      </div>
    </a>

  </div>

  <nav class="bottom-nav">
    <a href="hub.html" class="nav-tab active">
      <span class="nav-icon">◈</span>
      Cases
    </a>
    <a href="leaderboard.html" class="nav-tab">
      <span class="nav-icon">▲</span>
      Rankings
    </a>
    <a href="profile.html" class="nav-tab">
      <span class="nav-icon">○</span>
      Profile
    </a>
  </nav>

  <script src="mysteries.js"></script>
  <script>
    document.getElementById('currency-val').textContent = getCurrency().toLocaleString();
  </script>
  <script src="shared.js"></script>
</body>
</html>
