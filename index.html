<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Deduction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0D0D0D;
      --pink: #FF2D78;
      --violet: #7B2FFF;
      --cyan: #00F5FF;
      --green: #00FF88;
      --yellow: #FFD700;
      --text: #E8E8E8;
      --text-dim: #666;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(123,47,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(123,47,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: grid-scroll 20s linear infinite;
    }

    @keyframes grid-scroll {
      0% { background-position: 0 0; }
      100% { background-position: 60px 60px; }
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 50% 50%, rgba(123,47,255,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 300px 200px at 20% 80%, rgba(255,45,120,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 300px 200px at 80% 20%, rgba(0,245,255,0.05) 0%, transparent 60%);
      pointer-events: none;
    }
    .bg-glow::after {
      content: '';
      position: absolute;
      left: 0; right: 0; top: 0;
      height: 160px;
      background: linear-gradient(180deg, transparent 0%, rgba(0,245,255,0.04) 35%, rgba(0,245,255,0.06) 50%, rgba(0,245,255,0.04) 65%, transparent 100%);
      animation: beam-sweep 16s linear infinite;
    }
    @keyframes beam-sweep {
      0%   { transform: translateY(-160px); opacity: 0; }
      4%   { opacity: 1; }
      70%  { opacity: 1; }
      80%  { transform: translateY(100vh); opacity: 0; }
      100% { transform: translateY(100vh); opacity: 0; }
    }

    .corner {
      position: fixed;
      width: 60px;
      height: 60px;
      z-index: 20;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--violet);
      opacity: 0.4;
    }
    .corner--tl { top: 20px; left: 20px; }
    .corner--tl::before { top: 0; left: 0; width: 1px; height: 24px; }
    .corner--tl::after  { top: 0; left: 0; width: 24px; height: 1px; }
    .corner--tr { top: 20px; right: 20px; }
    .corner--tr::before { top: 0; right: 0; width: 1px; height: 24px; }
    .corner--tr::after  { top: 0; right: 0; width: 24px; height: 1px; }
    .corner--bl { bottom: 20px; left: 20px; }
    .corner--bl::before { bottom: 0; left: 0; width: 1px; height: 24px; }
    .corner--bl::after  { bottom: 0; left: 0; width: 24px; height: 1px; }
    .corner--br { bottom: 20px; right: 20px; }
    .corner--br::before { bottom: 0; right: 0; width: 1px; height: 24px; }
    .corner--br::after  { bottom: 0; right: 0; width: 24px; height: 1px; }

    /* ── Mask icon ──────────────────────────────────────────────── */
    .mask-icon {
      width: 100px; height: 130px;
      margin: 0 auto 28px;
      opacity: 0;
      animation: fade-up 0.5s ease 0.15s forwards;
    }
    .mask-icon svg { width: 100%; height: 100%; overflow: visible; }

    @keyframes mask-breathe {
      0%,100% { filter: drop-shadow(0 0 6px rgba(123,47,255,0.6)) drop-shadow(0 0 20px rgba(0,245,255,0.22)); }
      50%      { filter: drop-shadow(0 0 16px rgba(123,47,255,1)) drop-shadow(0 0 40px rgba(0,245,255,0.45)) drop-shadow(0 0 60px rgba(255,45,120,0.22)); }
    }
    .mask-icon svg { animation: mask-breathe 5s ease-in-out infinite; }

    /* ── Animated scan on divider ───────────────────────────────── */
    .divider {
      position: relative;
      overflow: hidden;
    }
    .divider::after {
      content: '';
      position: absolute;
      top: 0; left: -80px; width: 80px; height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.75), transparent);
      animation: scan-pulse 8s ease-in-out infinite 1.5s;
    }
    @keyframes scan-pulse {
      0%   { left: -80px; opacity: 0; }
      2%   { opacity: 1; }
      14%  { left: 100%; opacity: 0.9; }
      16%  { opacity: 0; }
      100% { left: 100%; opacity: 0; }
    }

    .settings-link {
      position: fixed;
      top: 24px;
      right: 32px;
      z-index: 20;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s;
    }
    .settings-link:hover { color: var(--text); }

    .hero {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px 24px;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0;
      animation: fade-up 0.6s ease 0.3s forwards;
    }

    .title {
      font-size: clamp(52px, 10vw, 96px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 8px;
      opacity: 0;
      animation: fade-up 0.7s ease 0.5s forwards;
    }

    .title-neon {
      background: linear-gradient(135deg, var(--pink) 0%, var(--violet) 50%, var(--cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(255,45,120,0.5)) drop-shadow(0 0 60px rgba(123,47,255,0.3));
    }

    .title-sub {
      display: block;
      font-size: clamp(14px, 2.5vw, 20px);
      font-weight: 300;
      letter-spacing: 0.5em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-top: 12px;
      -webkit-text-fill-color: initial;
      background: none;
      filter: none;
      opacity: 0;
      animation: fade-up 0.7s ease 0.7s forwards;
    }

    .divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--violet), transparent);
      margin: 40px auto;
      opacity: 0;
      animation: fade-up 0.5s ease 0.9s forwards;
    }

    .flavor-text {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-dim);
      max-width: 460px;
      line-height: 1.7;
      margin-bottom: 52px;
      opacity: 0;
      animation: fade-up 0.6s ease 1.0s forwards;
    }

    .flavor-text em {
      color: var(--pink);
      font-style: normal;
    }

    .btn-start {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: transparent;
      border: 1px solid var(--pink);
      color: var(--pink);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 20px 56px;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(255,45,120,0.2), inset 0 0 20px rgba(255,45,120,0.02);
      opacity: 0;
      animation: fade-up 0.6s ease 1.2s forwards;
    }

    .btn-start::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--pink);
      transform: translateX(-101%);
      transition: transform 0.3s ease;
    }

    .btn-start:hover::before { transform: translateX(0); }
    .btn-start:hover { color: #0D0D0D; box-shadow: 0 0 40px rgba(255,45,120,0.5); }
    .btn-start span { position: relative; z-index: 1; }
    .btn-start .btn-arrow {
      position: relative;
      z-index: 1;
      font-size: 18px;
      transition: transform 0.3s ease;
    }
    .btn-start:hover .btn-arrow { transform: translateX(4px); }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <a href="settings.html" class="settings-link">Settings</a>

  <main class="hero">
    <p class="eyebrow">// Detective Agency — Case Files</p>

    <div class="mask-icon" aria-hidden="true"></div>

    <h1 class="title">
      <span class="title-neon">NEON<br>DEDUCTION</span>
      <span class="title-sub">A Detective's Mind Game</span>
    </h1>

    <div class="divider"></div>

    <p class="flavor-text">
      The city never sleeps, and neither do its secrets.<br>
      Ask the right questions. Read the signals.<br>
      <em>Reveal the truth before time runs out.</em>
    </p>

    <a href="hub.html" class="btn-start">
      <span>Start Deduction</span>
      <span class="btn-arrow">→</span>
    </a>
  </main>
  <script src="shared.js"></script>
</body>
</html>
