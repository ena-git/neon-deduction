<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Case Files — Neon Deduction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0D0D0D;
      --pink: #FF2D78;
      --violet: #7B2FFF;
      --cyan: #00F5FF;
      --green: #00FF88;
      --yellow: #FFD700;
      --red: #FF3333;
      --text: #E8E8E8;
      --text-dim: #666;
      --card-bg: #0F0F0F;
      --border: #1A1A1A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 800px 500px at 50% 20%, rgba(123,47,255,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .bg-glow::after {
      content: '';
      position: absolute;
      left: 0; right: 0; top: 0;
      height: 160px;
      background: linear-gradient(180deg, transparent 0%, rgba(0,245,255,0.04) 35%, rgba(0,245,255,0.06) 50%, rgba(0,245,255,0.04) 65%, transparent 100%);
      animation: beam-sweep 16s linear infinite;
    }
    @keyframes beam-sweep {
      0%   { transform: translateY(-160px); opacity: 0; }
      4%   { opacity: 1; }
      70%  { opacity: 1; }
      80%  { transform: translateY(100vh); opacity: 0; }
      100% { transform: translateY(100vh); opacity: 0; }
    }

    /* Top bar */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 40px;
      background: rgba(13,13,13,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text); }

    .top-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .currency-display {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--yellow);
    }

    /* Page header */
    .page-header {
      padding: 56px 40px 32px;
      position: relative;
    }

    .page-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 12px;
      text-shadow: 0 0 14px rgba(0,245,255,0.7);
    }

    .page-title {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      text-shadow: 0 0 40px rgba(123,47,255,0.35), 0 0 80px rgba(123,47,255,0.1);
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--text-dim);
      margin-top: 10px;
      font-weight: 400;
    }

    .header-rule {
      height: 1px;
      background: linear-gradient(90deg, var(--violet) 0%, transparent 60%);
      margin-top: 32px;
      opacity: 0.4;
      position: relative;
      overflow: hidden;
    }
    .header-rule::after {
      content: '';
      position: absolute;
      top: 0; left: -80px; width: 80px; height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.7), transparent);
      animation: scan-pulse 10s ease-in-out infinite 2s;
    }
    @keyframes scan-pulse {
      0%   { left: -80px; opacity: 0; }
      2%   { opacity: 1; }
      12%  { left: 100%; opacity: 0.8; }
      14%  { opacity: 0; }
      100% { left: 100%; opacity: 0; }
    }

    /* Reticle dot before case numbers */
    .case-number::before {
      content: '◉';
      margin-right: 7px;
      font-size: 8px;
      color: var(--violet);
      opacity: 0.55;
      text-shadow: 0 0 6px var(--violet);
    }

    /* Cases grid */
    .cases-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 20px;
      padding: 32px 40px 60px;
    }

    /* Case card */
    .case-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 28px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color 0.25s ease, transform 0.2s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .case-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(123,47,255,0.04) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .case-card:hover {
      border-color: rgba(123,47,255,0.5);
      transform: translateY(-2px);
    }

    .case-card:hover::before { opacity: 1; }

    /* Glow strip on hover */
    .case-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--violet), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .case-card:hover::after { opacity: 1; }

    /* Easy/Medium/Hard specific card accents */
    .case-card.easy:hover   { border-color: rgba(0,255,136,0.4); box-shadow: 0 4px 30px rgba(0,255,136,0.06); }
    .case-card.easy::after  { background: linear-gradient(90deg, transparent, var(--green), transparent); }
    .case-card.medium:hover { border-color: rgba(255,215,0,0.4); box-shadow: 0 4px 30px rgba(255,215,0,0.06); }
    .case-card.medium::after{ background: linear-gradient(90deg, transparent, var(--yellow), transparent); }
    .case-card.hard:hover   { border-color: rgba(255,45,120,0.5); box-shadow: 0 4px 30px rgba(255,45,120,0.08); }
    .case-card.hard::after  { background: linear-gradient(90deg, transparent, var(--pink), transparent); }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .case-number {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .difficulty-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 3px;
    }

    .difficulty-badge.easy   { color: var(--green);  background: rgba(0,255,136,0.1);  border: 1px solid rgba(0,255,136,0.2);  text-shadow: 0 0 8px rgba(0,255,136,0.7); }
    .difficulty-badge.medium { color: var(--yellow); background: rgba(255,215,0,0.08); border: 1px solid rgba(255,215,0,0.2);  text-shadow: 0 0 8px rgba(255,215,0,0.7); }
    .difficulty-badge.hard   { color: var(--pink);   background: rgba(255,45,120,0.08); border: 1px solid rgba(255,45,120,0.2); text-shadow: 0 0 8px rgba(255,45,120,0.7); }

    .case-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.2;
      margin-bottom: 12px;
      text-shadow: 0 0 22px rgba(123,47,255,0.3);
    }

    /* Completed (solved) case card — greyed out but still playable */
    .case-card.done {
      opacity: 0.35;
      filter: grayscale(1);
    }
    .case-card.done:hover {
      opacity: 0.65;
      filter: grayscale(0.6);
      border-color: rgba(123,47,255,0.3);
      transform: translateY(-2px);
    }
    .case-card.done::after { display: none; }
    .replay-badge {
      position: absolute; top: 10px; right: 12px;
      font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-dim); border: 1px solid #2a2a2a; border-radius: 3px;
      padding: 2px 7px; background: var(--card-bg);
    }
    .case-card.done:hover .replay-badge { color: var(--violet); border-color: rgba(123,47,255,0.4); }

    .case-scenario {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .case-location {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .open-arrow {
      font-size: 18px;
      color: var(--violet);
      transition: transform 0.2s, color 0.2s;
    }

    .case-card:hover .open-arrow {
      transform: translateX(4px);
      color: var(--pink);
    }

    /* Signal legend */
    .legend {
      margin: 0 40px 48px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 32px;
      flex-wrap: wrap;
    }

    .legend-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .legend-items {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .sig-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .sig-dot.green  { background: var(--green);  box-shadow: 0 0 6px var(--green),  0 0 14px var(--green); }
    .sig-dot.yellow { background: var(--yellow); box-shadow: 0 0 6px var(--yellow), 0 0 14px var(--yellow); }
    .sig-dot.red    { background: var(--red);    box-shadow: 0 0 6px var(--red),    0 0 14px var(--red); }
    .sig-dot.gray   { background: #444; }
    .diff-dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0;
    }
    .diff-dot.easy   { background: var(--green);  box-shadow: 0 0 6px var(--green),  0 0 12px var(--green); }
    .diff-dot.medium { background: var(--yellow); box-shadow: 0 0 6px var(--yellow), 0 0 12px var(--yellow); }
    .diff-dot.hard   { background: var(--pink);   box-shadow: 0 0 6px var(--pink),   0 0 12px var(--pink); }
    .diff-dot.solved { background: #444; box-shadow: none; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="top-bar">
    <a href="hub.html" class="back-btn">← Back</a>
    <span class="top-title">Case Files</span>
    <div class="currency-display">◈ <span id="currency-val">0</span></div>
  </div>

  <div class="page-header">
    <p class="page-eyebrow">// Active Investigations</p>
    <h1 class="page-title">Choose Your Case</h1>
    <p class="page-subtitle">Ask questions. Read the signals. Uncover the truth.</p>
    <div class="header-rule"></div>
  </div>

  <div class="cases-grid" id="cases-grid">
    <!-- Cards injected by JS -->
  </div>

  <div class="legend">
    <span class="legend-title">Signal Guide</span>
    <div class="legend-items">
      <div class="legend-item"><div class="sig-dot green"></div> Relevant — you're on the right track</div>
      <div class="legend-item"><div class="sig-dot yellow"></div> Partially relevant</div>
      <div class="legend-item"><div class="sig-dot red"></div> Off track</div>
      <div class="legend-item"><div class="sig-dot gray"></div> Inconclusive</div>
    </div>
  </div>

  <script src="mysteries.js"></script>
  <script>
    document.getElementById('currency-val').textContent = getCurrency().toLocaleString();

    const grid = document.getElementById('cases-grid');
    const completed = JSON.parse(localStorage.getItem('nd_completed_cases') || '[]');
    const practicePool = MYSTERIES.filter(m => !m.variantOf && (m.mode === 'practice' || m.mode === 'both'));

    // Played cases sink to the bottom
    const sorted = [...practicePool].sort((a, b) =>
      (completed.includes(a.id) ? 1 : 0) - (completed.includes(b.id) ? 1 : 0)
    );

    sorted.forEach(m => {
      const card = document.createElement('a');
      const isDone = completed.includes(m.id);
      card.className = `case-card ${m.difficultyClass}${isDone ? ' done' : ''}`;

      // All cards are clickable — done cards are replays
      card.href = 'game.html';
      card.addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.setItem('nd_current_mystery', m.id);
        localStorage.removeItem('nd_pending_question');
        localStorage.removeItem('nd_signal_response');
        localStorage.removeItem('nd_signal_history');
        window.location.href = 'game.html';
      });

      card.innerHTML = `
        ${isDone ? '<span class="replay-badge">Play Again</span>' : ''}
        <div class="card-top">
          <span class="case-number">${escapeHtml(m.caseNumber)}</span>
          <span style="display:flex;align-items:center;gap:8px">
            <span class="diff-dot ${isDone ? 'solved' : m.difficultyClass}"></span>
            <span class="difficulty-badge ${m.difficultyClass}">${isDone ? 'SOLVED' : escapeHtml(m.difficulty)}</span>
          </span>
        </div>
        <h2 class="case-title">${escapeHtml(m.title)}</h2>
        <p class="case-scenario">${escapeHtml(m.scenario)}</p>
        <div class="card-footer">
          <span class="case-location">${escapeHtml(m.location)}</span>
          <span class="open-arrow">→</span>
        </div>
      `;

      grid.appendChild(card);
    });
  </script>
</body>
</html>
